controller_manager:
  ros__parameters:
    update_rate: 50

    ackermann_steer_controller:
      type: ackermann_steering_controller/AckermannSteeringController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

ackermann_steer_controller:
  ros__parameters:
    # Steering joints (front)
    front_steering_joints:
      - left_steering_joint
      - right_steering_joint

    # Drive joints (4WD)
    drive_joints:
      - front_left_joint
      - front_right_joint
      - rear_left_joint
      - rear_right_joint

    # Vehicle geometry
    wheelbase: 0.45
    front_wheel_track: 0.35
    rear_wheel_track: 0.35
    front_wheels_radius: 0.07
    rear_wheels_radius: 0.07

    # Odometry
    odom_frame_id: odom
    base_frame_id: base_footprint
    open_loop: false
    enable_odom_tf: true

    # Limits
    max_steering_angle: 0.5236
    max_linear_velocity: 5.0
    max_acceleration: 10.0
    max_angular_velocity: 2.0

    # PID tuning for steering
    steering_pid:
      p: 5.0
      i: 0.5
      d: 0.0
      i_clamp: 1.0

    # PID tuning for velocity
    velocity_pid:
      p: 10.0
      i: 1.0
      d: 0.0
      i_clamp: 5.0

joint_state_broadcaster:
  ros__parameters:
    type: joint_state_broadcaster/JointStateBroadcaster
