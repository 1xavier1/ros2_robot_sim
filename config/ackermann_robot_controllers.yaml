controller_manager:
  ros__parameters:
    update_rate: 50

    # Ackermann steering controller for 4WD vehicle
    ackermann_steer_controller:
      type: ackermann_steering_controller/AckermannSteeringController

    # Joint state broadcaster for publishing joint states
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

ackermann_steer_controller:
  ros__parameters:
    wheelbase: 0.45
    front_wheel_track_width: 0.35
    rear_wheel_track_width: 0.35
    front_wheel_stiffness: 1.0
    rear_wheel_stiffness: 1.0
    front_wheel_radius: 0.07
    rear_wheel_radius: 0.07

    # Steering joints (front wheels)
    front_steering_joints:
      - front_left_steer_joint
      - front_right_steer_joint

    # Drive joints (all 4 wheels)
    drive_joints:
      - front_left_wheel_joint
      - front_right_wheel_joint
      - rear_left_wheel_joint
      - rear_right_wheel_joint

    # Publishers
    odom_publisher: /robot/odom
    odom_transform_publisher: true
    odom_frame: odom
    base_frame: base_footprint

    publish_steering_state: true
    publish_wheel_states: true

    # Velocity and acceleration limits
    max_steering_angle: 0.5236
    max_linear_velocity: 5.0
    max_acceleration: 10.0
    max_angular_velocity: 2.0

    # PID tuning for steering
    steering_pid:
      p: 1.0
      i: 0.1
      d: 0.0
      i_clamp: 1.0

    # PID tuning for velocity
    velocity_pid:
      p: 10.0
      i: 1.0
      d: 0.0
      i_clamp: 5.0

joint_state_broadcaster:
  ros__parameters:
    type: joint_state_broadcaster/JointStateBroadcaster
