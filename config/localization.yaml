# Robot Localization EKF Configuration
# Fuse wheel odometry and IMU data. GPS NavSatFix requires a navsat_transform_node
# pipeline before it can be fused by ekf_node.

ekf_filter_node:
  ros__parameters:
    frequency: 50.0
    sensor_timeout: 0.1
    two_d_mode: false

    publish_tf: true
    publish_acceleration: false
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    odom0: /robot/odom
    odom0_config: [true, true, true,
                   false, false, false,
                   true, true, true,
                   false, false, true,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 50

    imu0: /robot/imu/data
    imu0_config: [false, false, false,
                  true, true, true,
                  false, false, false,
                  true, true, true,
                  true, true, true]
    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 100
    imu0_nodelay: false
    imu0_remove_gravitational_acceleration: true

