# Navigation2 Configuration for 3D Robot

amcl:
  ros__parameters:
    use_sim_time: true
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.1
    base_global_frame_id: "map"
    base_footprint_frame_id: "base_footprint"
    global_frame_id: "map"
    lambda_short: 0.1
    set_initial_pose: true
    z_hit: 0.5
    z_rand: 0.5
    z_short: 0.05
    max_beams: 60
    max_particles: 2000
    min_particles: 500
    resample_interval: 1
    transform_tolerance: 0.5

bt_navigator:
  ros__parameters:
    use_sim_time: true
    action_server_result_timeout: 900.0
    default_nav_through_poses_bt_xml: "$(find-pkg-share nav2_bt_navigator)/behavior_trees/navigate_through_poses.xml"
    default_nav_to_pose_bt_xml: "$(find-pkg-share nav2_bt_navigator)/behavior_trees/navigate_to_pose.xml"
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_controller_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_selector_bt_node
      - nav2_goal_behavior_bt_node

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_mask: [1, 2, 3, 4, 5, 6]
    always_stop_on_robots: true
    max_robot_pose_search_dist: 10.0

    # DWB Controller parameters
    DWB_MIN_VEL_X: -0.5
    DWB_MIN_VEL_Y: 0.0
    DWB_MAX_VEL_X: 0.5
    DWB_MAX_VEL_Y: 0.0
    DWB_MAX_VEL_THETA: 1.0
    DWB_MIN_VEL_X_VS_MIN_OBSTACLE_DIST: 0.1

    # Scale constraints
    DWB_SCALE_VELOCITY: 1.0
    DWB_SCALE_VELOCITY_ROS: 1.0

    # Progress checker
    progress_checker_plugin: "progress_checker"
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.25
      movement_time_allowance: 10.0

    # Goal checker
    goal_checker_plugin: "goal_checker"
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      stateful: true

    # Local planner
    local_planner: "dwb_core::DWBLocalPlanner"
    dwb_core:
      plugin: "dwb_core::DWBLocalPlanner"
      critics:
        - "base_obstacle"
        - "twirling"
        - "goal_align"
        - "path_align"
        - "path_dist"
        - "goal_dist"
      base_obstacle:
        plugin: "dwb_plugins::BaseObstacleCritic"
        scale: 1.0
        enabled: true
      twirling:
        plugin: "dwb_plugins::TwirlingCritic"
        scale: 0.0
        enabled: true
      goal_align:
        plugin: "dwb_plugins::GoalAlignCritic"
        scale: 1.0
        enabled: true
      path_align:
        plugin: "dwb_plugins::PathAlignCritic"
        scale: 1.0
        enabled: true
      path_dist:
        plugin: "dwb_plugins::PathDistCritic"
        scale: 1.0
        enabled: true
      goal_dist:
        plugin: "dwb_plugins::GoalDistCritic"
        scale: 1.0
        enabled: true

planner_server:
  ros__parameters:
    use_sim_time: true
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner::SmacPlannerHybrid"
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      terminal_checking_interval: 5000
      maximum_planning_time: 5.0
      smooth_path: true
      get_lookahead_dist: -1.0
      min_turning_radius: 0.20
      w_reverse_cost: 2.5
      w_oscillation_reset_dist: 0.05
      oscillation_reset_angle: 0.2
      analytical_expansion_max_cost: 40.0
      analytical_expansion_max_radius: 3.0
      analytical_expansion_max_timestep: 1.0
      min_on_loop_dist_to_avoid: 0.5
      cut_off_Obstacle_covered_area: true

smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: true
    local_costmap:
      ROS2:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        voxel_decay: 15.0
        publish_voxel_map: true
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 20
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: pointcloud
        pointcloud:
          plugin: "sensor_msgs::PointCloud2"
          topic: /robot/velodyne_points
          max_obstacle_height: 2.0
          inf_is_valid: false
          clearing: true
          marking: true
          min_z: 0.1
          max_z: 2.0
          vertical_fov: 0.5236
          vertical_fov_padding: 0.0
          horizontal_fov: 3.141592653589793
          decay_acceleration: 5.0
    local_costmap_client: "rclcpp_node"
    local_costmap_frequency: 10.0
    local_costmap_layer: " voxel_server"

global_costmap:
  ros__parameters:
    use_sim_time: true
    global_costmap:
      plugin: "nav2_costmap_2d::StaticLayer"
    global_costmap_client: "rclcpp_node"
    global_costmap_frequency: 1.0
    global_costmap_layer: "static_server"

local_costmap:
  ros__parameters:
    use_sim_time: true
    local_costmap:
      plugin: "nav2_costmap_2d::VoxelLayer"
    local_costmap_client: "rclcpp_node"
    local_costmap_frequency: 10.0
    local_costmap_layer: "voxel_server"

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    scale_vel: true
    speed_lim_vx: 0.5
    speed_lim_vy: 0.0
    speed_lim_vtheta: 1.0
    min_speed: 0.0
    decel_lim_vx: -2.5
    decel_lim_vy: 0.0
    decel_lim_vtheta: -3.2
    max_speed: 1.0

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    action_server_result_timeout: 900.0
    loop_rate: 100
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200
